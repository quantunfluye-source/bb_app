<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Administrativo - Menú Express</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f97316">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
  <style>
    :root {
      --color-primario: #f97316;
      --color-fondo: #ffffff;
      --color-texto: #1f2937;
      --color-gris: #6b7280;
      --color-gris-claro: #f3f4f6;
      --color-verde-neon: #10b981;
      --color-rojo: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-fondo);
      color: var(--color-texto);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--color-primario);
      color: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    header h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .container {
      flex: 1;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .auth-section {
      background: var(--color-gris-claro);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: var(--color-texto);
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--color-primario);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
    }

    button {
      background: var(--color-primario);
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.3s;
    }

    button:hover {
      background: #ea6317;
    }

    button.secondary {
      background: var(--color-gris);
    }

    button.secondary:hover {
      background: #4b5563;
    }

    button.danger {
      background: var(--color-rojo);
    }

    button.danger:hover {
      background: #dc2626;
    }

    .section {
      display: none;
      animation: fadeIn 0.3s;
    }

    .section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: var(--color-gris-claro);
      color: var(--color-texto);
      padding: 10px 20px;
      border: 2px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .tab-btn.active {
      background: var(--color-primario);
      color: white;
      border-color: var(--color-primario);
    }

    .platillo-item {
      background: var(--color-gris-claro);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: grab;
      border: 2px solid transparent;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .platillo-item:active { cursor: grabbing; }
    .platillo-item[draggable="true"]:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
    }

    .platillo-info {
      flex: 1;
      min-width: 0;
    }

    .platillo-acciones {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .mensaje {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      display: none;
    }

    .mensaje.exito {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .mensaje.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    @media (max-width: 640px) {
      .container {
        padding: 10px;
      }

      .tabs {
        gap: 5px;
      }

      .tab-btn {
        padding: 8px 12px;
        font-size: 12px;
      }

      .platillo-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .platillo-acciones {
        width: 100%;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>🍽️ Panel Administrativo</h1>
    <p id="tiendaNombre">Menú Express</p>
  </header>

  <div class="container">
    <div class="auth-section" id="authSection">
      <h2>Autenticación</h2>
      <div class="form-group">
        <label for="adminPassword">Contraseña de Administrador:</label>
        <input type="password" id="adminPassword" placeholder="Ingresa tu contraseña">
      </div>
      <button onclick="autenticar()">Entrar al Panel</button>
    </div>

    <div id="panelSection" style="display: none;">
      <div class="tabs">
        <button class="tab-btn active" onclick="mostrarTab('config')">⚙️ Configuración</button>
        <button class="tab-btn" onclick="mostrarTab('platillos')">🍽️ Platillos</button>
        <button class="tab-btn" onclick="mostrarTab('clientes')">👥 Clientes</button>
      </div>

      <div id="mensajeDiv" class="mensaje"></div>

      <!-- TAB: CONFIGURACIÓN -->
      <div id="config" class="section active">
        <h2>Configuración de la Tienda</h2>
        <div class="form-group">
          <label for="nombreTienda">Nombre de la Tienda:</label>
          <input type="text" id="nombreTienda" placeholder="Ej: La Taquería">
        </div>
        <div class="form-group">
          <label for="telefonoTienda">Teléfono de Contacto:</label>
          <input type="text" id="telefonoTienda" placeholder="Ej: +521234567890">
        </div>
        <div class="form-group">
          <label for="colorPrimario">Color Primario:</label>
          <input type="color" id="colorPrimario" value="#f97316">
        </div>
        <div class="form-group">
          <label for="piePagina">Pie de Página (detalles legales, horarios):</label>
          <textarea id="piePagina" rows="4" placeholder="Ej: Abierto de 11am a 11pm | Delivery en zona X"></textarea>
        </div>
        <button onclick="guardarConfig()">💾 Guardar Configuración</button>
      </div>

      <!-- TAB: PLATILLOS -->
      <div id="platillos" class="section">
        <h2>Gestionar Platillos</h2>
        
        <h3>Agregar Nuevo Platillo</h3>
        <div class="form-group">
          <label for="categoria">Categoría:</label>
          <input type="text" id="categoria" placeholder="Ej: Tacos, Bebidas, Postres">
        </div>
        <div class="form-group">
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" placeholder="Ej: Tacos al Pastor">
        </div>
        <div class="form-group">
          <label for="descripcion">Descripción:</label>
          <textarea id="descripcion" rows="2" placeholder="Ej: Con carne, piña y cebolla caramelizada"></textarea>
        </div>
        <div class="form-group">
          <label for="precio">Precio ($):</label>
          <input type="number" id="precio" step="0.01" placeholder="Ej: 45.00">
        </div>
        <div class="form-group">
          <label for="imagenFile">Subir Imagen:</label>
          <input type="file" id="imagenFile" accept="image/*">
        </div>
        <button onclick="agregarPlatillo()">➕ Agregar Platillo</button>

        <h3 style="margin-top: 30px;">Platillos Actuales</h3>
        <div id="listaPlatillos"></div>
      </div>

      <!-- TAB: CLIENTES -->
      <div id="clientes" class="section">
        <h2>Clientes Registrados</h2>
        <div id="listaClientes"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '';
    let adminAuth = false;
        let adminPassword = localStorage.getItem('adminPassword') || '';
    let menu = {};  // Guardar menú para editar

    function mostrarMensaje(texto, tipo = 'exito') {
      const div = document.getElementById('mensajeDiv');
      div.textContent = texto;
      div.className = `mensaje ${tipo}`;
      setTimeout(() => div.className = 'mensaje', 5000);
    }

    async function autenticar() {
      const password = document.getElementById('adminPassword').value;
      if (!password) {
        mostrarMensaje('Ingresa tu contraseña', 'error');
        return;
      }

      try {
        const res = await fetch(`${API_URL}/api/config`, {
          headers: { 'x-admin-password': password }
        });

        if (res.ok) {
          adminAuth = true;
          adminPassword = password;
          localStorage.setItem('adminPassword', password);
          document.getElementById('authSection').style.display = 'none';
          document.getElementById('panelSection').style.display = 'block';
          cargarDatos();
          mostrarMensaje('✅ Autenticado correctamente', 'exito');
        } else {
          mostrarMensaje('❌ Contraseña incorrecta', 'error');
        }
      } catch (error) {
        mostrarMensaje(`Error: ${error.message}`, 'error');
      }
    }

    function mostrarTab(tabName) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    async function cargarDatos() {
      try {
        const configRes = await fetch(`${API_URL}/api/config`);
        const config = await configRes.json();
        
        // config ya es un objeto {key: value}
        document.getElementById('nombreTienda').value = config.nombre_tienda || '';
        document.getElementById('telefonoTienda').value = config.telefono || '';
        document.getElementById('colorPrimario').value = config.color_primario || '#f97316';
        document.getElementById('piePagina').value = config.pie_pagina || '';
        document.getElementById('tiendaNombre').textContent = config.nombre_tienda || 'Menú Express';

        const menuRes = await fetch(`${API_URL}/api/menu`);
        menu = await menuRes.json();
        mostrarPlatillos(menu);

        const clientesRes = await fetch(`${API_URL}/api/clientes`);
        if (clientesRes.ok) {
          const clientes = await clientesRes.json();
          mostrarClientes(clientes);
        }
      } catch (error) {
        mostrarMensaje(`Error cargando datos: ${error.message}`, 'error');
        console.error(error);
      }
    }

    async function guardarConfig() {
      const data = {
        nombre_tienda: document.getElementById('nombreTienda').value,
        telefono: document.getElementById('telefonoTienda').value,
        color_primario: document.getElementById('colorPrimario').value,
        pie_pagina: document.getElementById('piePagina').value
      };

      try {
        const promises = Object.entries(data).map(([key, value]) =>
          fetch(`${API_URL}/api/admin/config`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
          'x-admin-password': adminPassword
            },
            body: JSON.stringify({ key, value })
          })
        );

        await Promise.all(promises);
        mostrarMensaje('✅ Configuración guardada', 'exito');
      } catch (error) {
        mostrarMensaje(`Error: ${error.message}`, 'error');
      }
    }

    async function agregarPlatillo() {
      const data = {
        categoria: document.getElementById('categoria').value,
        nombre: document.getElementById('nombre').value,
        descripcion: document.getElementById('descripcion').value,
        precio: parseFloat(document.getElementById('precio').value),
      };

      if (!data.categoria || !data.nombre || !data.precio) {
        mostrarMensaje('Rellena todos los campos obligatorios', 'error');
        return;
      }

      const imagenFile = document.getElementById('imagenFile').files[0];

      try {
        if (imagenFile) {
          const formData = new FormData();
          formData.append('imagen', imagenFile);

          const uploadRes = await fetch(`${API_URL}/api/upload/imagen`, {
            method: 'POST',
            headers: { 'x-admin-password': adminPassword },
            body: formData
          });

          if (uploadRes.ok) {
            const uploadData = await uploadRes.json();
            data.imagen_url = uploadData.url;
          } else {
            const errText = await uploadRes.text();
            mostrarMensaje(`❌ Error subiendo imagen: ${errText}`, 'error');
            return;
          }
        }

        const res = await fetch(`${API_URL}/api/admin/platillo`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-password': adminPassword
          },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          mostrarMensaje('✅ Platillo agregado', 'exito');
          document.getElementById('categoria').value = '';
          document.getElementById('nombre').value = '';
          document.getElementById('descripcion').value = '';
          document.getElementById('precio').value = '';
          document.getElementById('imagenFile').value = '';
          cargarDatos();
        } else {
          const errText = await res.text();
          mostrarMensaje(`❌ Error: ${errText}`, 'error');
        }
      } catch (error) {
        mostrarMensaje(`Error: ${error.message}`, 'error');
        console.error('Error en agregarPlatillo:', error);
      }
    }

    function mostrarPlatillos(menu) {
      const categorias = Object.keys(menu);
      const orden = ['especial', ...categorias.filter(c => c !== 'especial')];

      const html = orden.filter(c => menu[c]).map(categoria => {
        const platillos = menu[categoria];
        const nombreCat = categoria === 'especial' ? '⭐ Especial del día' : categoria.charAt(0).toUpperCase() + categoria.slice(1);

        const itemsHtml = platillos.map(p => `
          <div class="platillo-item"
               draggable="true"
               data-id="${p.id}"
               data-categoria="${p.categoria}"
               ondragstart="dragStart(event)"
               ondragover="dragOver(event)"
               ondrop="dropPlatillo(event)"
               ondragend="dragEnd(event)"
               title="Arrastra para reordenar o cambiar de categoría">
            ${p.imagen_url
              ? `<img src="${p.imagen_url}" alt="${p.nombre}" style="width:56px;height:56px;object-fit:cover;border-radius:8px;flex-shrink:0;">`
              : `<div style="width:56px;height:56px;border-radius:8px;background:linear-gradient(135deg,#1e3a8a,#2563eb);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;">🍽️</div>`
            }
            <div class="platillo-info" style="flex:1;min-width:0">
              <strong>${p.nombre}</strong> - $${parseFloat(p.precio).toFixed(2)}
              <p style="font-size:12px;color:var(--color-gris);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.descripcion || ''}</p>
            </div>
            <div class="platillo-acciones">
              <span style="cursor:grab;font-size:18px;color:#9ca3af;margin-right:4px" title="Arrastra para reordenar">⠿</span>
              <button class="secondary" onclick="editarPlatillo('${p.id}')">✏️ Editar</button>
              <button class="danger" onclick="eliminarPlatillo('${p.id}')">🗑️ Eliminar</button>
            </div>
          </div>
        `).join('');

        return `<h4 style="margin:18px 0 8px;padding-bottom:6px;border-bottom:2px solid #f3f4f6">${nombreCat} <span style="font-size:12px;color:#9ca3af;font-weight:normal">(${platillos.length} platillos)</span></h4>${itemsHtml}`;
      }).join('');

      document.getElementById('listaPlatillos').innerHTML = html || '<p>No hay platillos aún</p>';
    }

    let dragSrcId = null;
    let dragSrcCat = null;

    function dragStart(e) {
      dragSrcId = e.currentTarget.dataset.id;
      dragSrcCat = e.currentTarget.dataset.categoria;
      e.currentTarget.style.opacity = '0.4';
      e.dataTransfer.effectAllowed = 'move';
    }

    function dragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      e.currentTarget.style.borderTop = '3px solid var(--color-primario)';
    }

    function dragEnd(e) {
      e.currentTarget.style.opacity = '1';
      document.querySelectorAll('.platillo-item').forEach(el => {
        el.style.borderTop = '';
      });
    }

    async function dropPlatillo(e) {
      e.preventDefault();
      const targetId = e.currentTarget.dataset.id;
      const targetCat = e.currentTarget.dataset.categoria;
      e.currentTarget.style.borderTop = '';

      if (!dragSrcId || dragSrcId === targetId) return;

      try {
        if (dragSrcCat !== targetCat) {
          await fetch(`${API_URL}/api/admin/platillo/${dragSrcId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
            body: JSON.stringify({ categoria: targetCat })
          });
          mostrarMensaje(`✅ Platillo movido a "${targetCat}"`, 'exito');
        } else {
          const cat = APP.menu[dragSrcCat] || [];
          const srcIdx = cat.findIndex(p => p.id === dragSrcId);
          const tgtIdx = cat.findIndex(p => p.id === targetId);
          if (srcIdx === -1 || tgtIdx === -1) return;

          [cat[srcIdx], cat[tgtIdx]] = [cat[tgtIdx], cat[srcIdx]];

          await Promise.all(cat.map((p, i) =>
            fetch(`${API_URL}/api/admin/platillo/${p.id}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
              body: JSON.stringify({ orden: i })
            })
          ));
        }
        await cargarDatos();
      } catch (err) {
        mostrarMensaje('❌ Error al reordenar: ' + err.message, 'error');
      }
    }


    async function eliminarPlatillo(id) {
      if (!confirm('¿Estás seguro?')) return;

      try {
        const res = await fetch(`${API_URL}/api/admin/platillo/${id}`, {
          method: 'DELETE',
          headers: { 'x-admin-password': adminPassword }
        });

        if (res.ok) {
          mostrarMensaje('✅ Platillo eliminado', 'exito');
          cargarDatos();
        }
      } catch (error) {
        mostrarMensaje(`Error: ${error.message}`, 'error');
      }
    }

    function mostrarClientes(clientes) {
      const html = clientes.map(c => `
        <div class="platillo-item">
          <div class="platillo-info">
            <strong>${c.nombre}</strong>
            <p style="font-size: 12px; color: var(--color-gris);">${c.direccion} | ${c.telefono || 'Sin teléfono'}</p>
          </div>
        </div>
      `).join('');

      document.getElementById('listaClientes').innerHTML = html || '<p>No hay clientes registrados</p>';
    }

    function editarPlatillo(id) {
      // Buscar el platillo en el menú
      let platillo = null;
      for (let cat in APP.menu) {
        const found = APP.menu[cat].find(p => p.id === id);
        if (found) {
          platillo = found;
          break;
        }
      }

      if (!platillo) {
        mostrarMensaje('Platillo no encontrado', 'error');
        return;
      }

      // Llenar formulario con datos actuales
      document.getElementById('categoria').value = platillo.categoria;
      document.getElementById('nombre').value = platillo.nombre;
      document.getElementById('descripcion').value = platillo.descripcion || '';
      document.getElementById('precio').value = platillo.precio;

      // Cambiar botón a "Guardar cambios"
      const btnAgregar = document.querySelector('[onclick="agregarPlatillo()"]');
      btnAgregar.textContent = '💾 Guardar Cambios';
      btnAgregar.onclick = () => guardarCambiosPlatillo(id);

      // Scroll a formulario
      document.getElementById('platillos').scrollIntoView({ behavior: 'smooth' });
      mostrarMensaje('Editando platillo - Actualiza los campos y guarda', 'exito');
    }

    async function guardarCambiosPlatillo(id) {
      const data = {
        categoria: document.getElementById('categoria').value,
        nombre: document.getElementById('nombre').value,
        descripcion: document.getElementById('descripcion').value,
        precio: parseFloat(document.getElementById('precio').value),
      };

      if (!data.categoria || !data.nombre || !data.precio) {
        mostrarMensaje('Rellena todos los campos obligatorios', 'error');
        return;
      }

      try {
        const res = await fetch(`${API_URL}/api/admin/platillo/${id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-password': adminPassword
          },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          mostrarMensaje('✅ Platillo actualizado', 'exito');
          document.getElementById('categoria').value = '';
          document.getElementById('nombre').value = '';
          document.getElementById('descripcion').value = '';
          document.getElementById('precio').value = '';
          document.getElementById('imagenFile').value = '';
          
          // Restaurar botón
          const btnAgregar = document.querySelector('[onclick*="Guardar"]') || document.querySelector('button');
          btnAgregar.textContent = '➕ Agregar Platillo';
          btnAgregar.onclick = () => agregarPlatillo();
          
          cargarDatos();
        } else {
          const errText = await res.text();
          mostrarMensaje(`❌ Error: ${errText}`, 'error');
        }
      } catch (error) {
        mostrarMensaje(`Error: ${error.message}`, 'error');
        console.error(error);
      }
    }

    // Cargar datos si ya estás autenticado
    window.addEventListener('load', () => {
      // Intentar auto-login con contraseña guardada
      if (adminPassword && !adminAuth) {
        document.getElementById('adminPassword').value = adminPassword;
        autenticar();
      } else if (adminAuth) {
        cargarDatos();
      }
    });
  </script>
</body>
</html>
